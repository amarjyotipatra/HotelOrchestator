services:
  # ─── PostgreSQL (backing store for Temporal) ───
  postgresql:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Temporal Server ───
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ─── Temporal Web UI ───
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  # ─── Hotel Orchestrator API ───
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TEMPORAL_ADDRESS=temporal:7233
      - BASE_URL=http://api:3000
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: on-failure

  # ─── Temporal Worker ───
  worker:
    build: .
    command: ["node", "dist/temporal/worker.js"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TEMPORAL_ADDRESS=temporal:7233
      - BASE_URL=http://api:3000
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      api:
        condition: service_started
    restart: on-failure

volumes:
  redis-data:
  postgresql-data:
