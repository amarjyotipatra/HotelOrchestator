services:
  # ─── Redis ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Temporal Server (dev server — all-in-one) ───
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=sqlite
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Temporal Web UI ───
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # ─── Hotel Orchestrator API ───
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TEMPORAL_ADDRESS=temporal:7233
      - BASE_URL=http://api:3000
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: on-failure

  # ─── Temporal Worker ───
  worker:
    build: .
    command: ["node", "dist/temporal/worker.js"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TEMPORAL_ADDRESS=temporal:7233
      - BASE_URL=http://api:3000
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
      api:
        condition: service_started
    restart: on-failure

volumes:
  redis-data:
